<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="57" stroke="#C9A84C" stroke-width="1.2" fill="none"/>
  <!-- Inner ring -->
  <circle cx="60" cy="60" r="50" stroke="#C9A84C" stroke-width="0.5" fill="none" opacity="0.5"/>
  <!-- Background fill -->
  <circle cx="60" cy="60" r="56" fill="url(#bgGrad)"/>

  <!-- Top decorative diamond -->
  <polygon points="60,7 63,12 60,17 57,12" fill="#C9A84C" opacity="0.9"/>
  <!-- Bottom decorative diamond -->
  <polygon points="60,103 63,108 60,113 57,108" fill="#C9A84C" opacity="0.9"/>
  <!-- Left decorative diamond -->
  <polygon points="3,60 8,57 13,60 8,63" fill="#C9A84C" opacity="0.9"/>
  <!-- Right decorative diamond -->
  <polygon points="107,60 112,57 117,60 112,63" fill="#C9A84C" opacity="0.9"/>

  <!-- Decorative arcs top -->
  <path d="M 36 18 Q 60 10 84 18" stroke="#C9A84C" stroke-width="0.7" fill="none" opacity="0.6"/>
  <!-- Decorative arcs bottom -->
  <path d="M 36 102 Q 60 110 84 102" stroke="#C9A84C" stroke-width="0.7" fill="none" opacity="0.6"/>

  <!-- K letter -->
  <text x="33" y="72" font-family="Cormorant Garamond, Georgia, serif" font-size="36" font-weight="600" fill="#C9A84C" letter-spacing="2">K</text>
  <!-- B letter -->
  <text x="62" y="72" font-family="Cormorant Garamond, Georgia, serif" font-size="36" font-weight="600" fill="#C9A84C" letter-spacing="2">B</text>

  <!-- Thin line under letters -->
  <line x1="30" y1="78" x2="90" y2="78" stroke="#C9A84C" stroke-width="0.6" opacity="0.7"/>

  <!-- Studio text -->
  <text x="60" y="90" font-family="Montserrat, sans-serif" font-size="6.5" font-weight="400" fill="#C9A84C" text-anchor="middle" letter-spacing="3" opacity="0.85">BRIDAL STUDIO</text>

  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2a1f0e" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0.95"/>
    </radialGradient>
  </defs>
</svg>
